<form (ngSubmit)="onSubmit()" class="mb-4">
  <div class="input-group">
    <input 
      type="text" 
      class="form-control" 
      [(ngModel)]="title" 
      name="title"
      placeholder="Enter movie title"
      required>
    <button class="btn btn-primary" type="submit">
      Search
    </button>
  </div>
</form>
